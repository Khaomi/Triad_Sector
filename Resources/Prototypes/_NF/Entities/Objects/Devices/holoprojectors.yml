- type: entity
  parent: HoloprojectorSecurity
  id: HoloprojectorNfsd
  name: TDF holobarrier projector
  description: Creates a solid but fragile holographic barrier.
  components:
  - type: Sprite
    sprite: _NF/Objects/Devices/Holoprojectors/nfsd.rsi
    state: icon
  - type: ChargeHolosignProjector
    signProto: HolosignNfsd
    signComponentName: Holobarrier

- type: entity
  parent: [BaseItem, RecyclableItemDeviceSmall] # Frontier: added RecyclableItemDeviceSmall
  id: HoloGraffitiProjector
  name: holograffiti projector
  description: Tag up the sharp end, let 'em know you were here.
  components:
  - type: HolosignProjector
    signProto: SpawnerHoloGraffitiRandom
    chargeUse: 60
  - type: Sprite
    sprite: _NF/Objects/Devices/Holoprojectors/graffiti.rsi
    state: icon
  - type: Item
    storedRotation: -90
  - type: UseDelay
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot {}
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: Tag
    tags:
    - HolofanProjector
  - type: StaticPrice
    price: 80

- type: entity
  parent: HoloGraffitiProjector
  id: HoloGraffitiProjectorEmpty
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
